project: ccot-steering
name: coconut_dryrun
seed: 42
model_id: Qwen/Qwen2.5-0.5B

paths:
  split_dir: data/splits
  train_path: data/splits/train.json
  train_internal_val_path: data/splits/train_internal_val.json
  steer_path: data/splits/steer.json
  val_path: data/splits/val.json
  test_path: data/splits/test.json
  cot_ckpt_meta: outputs/checkpoints/cot_dryrun/best_val_acc.json
  coconut_ckpt_meta: outputs/checkpoints/coconut_dryrun/best_val_acc.json
  vectors_dir: outputs/vectors
  alpha_dir: outputs/alpha
  results_dir: outputs/results
  logs_dir: outputs/logs

curriculum:
  c_thought: 2
  epochs_per_stage: 3
  max_latent_stage: 3
  pad_latent_to_max: true
  uniform_prob: 0.0

phase1a:
  num_epochs: 6
  batch_size_training: 1
  gradient_accumulation_steps: 32
  lr: 1.0e-4
  weight_decay: 0.0
  save_only_improve: true

phase1b:
  num_epochs: 13
  resume: 3
  batch_size_training: 1
  gradient_accumulation_steps: 32
  lr: 1.0e-4
  weight_decay: 0.0
  reset_optimizer: true
  save_only_improve: true
  stage_plan:
    - stage: 1
      epochs: 3
    - stage: 2
      epochs: 3
    - stage: 3
      epochs: 7

phase2:
  N_samples_per_question: 10
  temperature: 0.7
  max_new_tokens: 64
  min_examples_per_class: 100

phase3:
  alpha_max: 50.0
  gamma: 0.95
  lambda_m: 0.1
  lr: 1.0e-2
  max_steps: 200
  patience: 20

phase4:
  max_new_tokens: 128
  random_seed: 42
